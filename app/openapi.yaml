openapi: 3.0.3
info:
  title: Expense Tracker API
  description: Backend API for Expense Tracker mobile application
  version: 1.0.0
servers:
  - url: http://localhost:7071/api
    description: Local development server
  - url: https://exptracker-function-expensetracker.azurewebsites.net/api
    description: Azure production server

paths:
  /register:
    post:
      summary: Register a new user
      operationId: register
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - email
                - password
              properties:
                name:
                  type: string
                  example: John Doe
                email:
                  type: string
                  format: email
                  example: john@example.com
                password:
                  type: string
                  format: password
                  minLength: 6
                  example: "123456"
      responses:
        "201":
          description: User created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Validation error or email already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /login:
    post:
      summary: Login with email and password
      operationId: login
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                  example: john@example.com
                password:
                  type: string
                  format: password
                  minLength: 1
                  example: "123456"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /refreshToken:
    post:
      summary: Refresh access token using refresh token
      operationId: refreshToken
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - refreshToken
              properties:
                refreshToken:
                  type: string
                  example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
      responses:
        "200":
          description: New access token generated
          content:
            application/json:
              schema:
                type: object
                properties:
                  accessToken:
                    type: string
                    example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        "401":
          description: Invalid or expired refresh token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /getAccounts:
    get:
      summary: Get all user accounts
      operationId: getAccounts
      tags:
        - Accounts
      security:
        - BearerAuth: []
      responses:
        "200":
          description: List of accounts
          content:
            application/json:
              schema:
                type: object
                properties:
                  accounts:
                    type: array
                    items:
                      $ref: "#/components/schemas/Account"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /createAccount:
    post:
      summary: Create a new account
      operationId: createAccount
      tags:
        - Accounts
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - bank_name
                - account_mask
              properties:
                bank_name:
                  type: string
                  minLength: 1
                  example: Chase Bank
                account_mask:
                  type: string
                  minLength: 1
                  example: "1234"
      responses:
        "201":
          description: Account created
          content:
            application/json:
              schema:
                type: object
                properties:
                  account:
                    $ref: "#/components/schemas/Account"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /updateAccount:
    put:
      summary: Update an existing account
      operationId: updateAccount
      tags:
        - Accounts
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: query
          required: true
          schema:
            type: string
            minLength: 1
          description: Account ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              minProperties: 1
              properties:
                bank_name:
                  type: string
                  minLength: 1
                  example: Bank of America
                account_mask:
                  type: string
                  minLength: 1
                  example: "5678"
      responses:
        "200":
          description: Account updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  account:
                    $ref: "#/components/schemas/Account"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Account not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /deleteAccount:
    delete:
      summary: Delete an account
      operationId: deleteAccount
      tags:
        - Accounts
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: query
          required: true
          schema:
            type: string
            minLength: 1
          description: Account ID
      responses:
        "200":
          description: Account deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Account deleted successfully
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Account not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /transactions:
    get:
      summary: Get paginated transactions with filters
      operationId: transactions
      tags:
        - Transactions
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
          description: Page number (50 transactions per page)
        - name: tnx_type
          in: query
          required: false
          schema:
            type: string
            enum: [credit, debit]
          description: Filter by transaction type
        - name: date_from
          in: query
          required: false
          schema:
            type: string
            format: date
            example: "2025-03-01"
          description: Start date (ISO 8601). Defaults to start of current month.
        - name: date_to
          in: query
          required: false
          schema:
            type: string
            format: date
            example: "2025-03-31"
          description: End date (ISO 8601). Defaults to current time.
        - name: account_id
          in: query
          required: false
          schema:
            type: string
            example: 507f1f77bcf86cd799439012
          description: Filter by account ID
        - name: sort
          in: query
          required: false
          schema:
            type: string
            enum: [asc, desc]
            default: desc
          description: Sort order by transaction date
      responses:
        "200":
          description: Paginated list of transactions
          content:
            application/json:
              schema:
                type: object
                properties:
                  transactions:
                    type: array
                    items:
                      $ref: "#/components/schemas/Transaction"
                  pagination:
                    $ref: "#/components/schemas/Pagination"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /transaction/{id}:
    get:
      summary: Get a single transaction by ID with full details
      operationId: getTransaction
      tags:
        - Transactions
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            example: 507f1f77bcf86cd799439011
          description: Transaction ID
      responses:
        "200":
          description: Transaction details
          content:
            application/json:
              schema:
                type: object
                properties:
                  transaction:
                    $ref: "#/components/schemas/TransactionDetail"
        "400":
          description: Missing or invalid transaction ID
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Transaction not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /getCategoryBreakdown:
    get:
      summary: Get spending/income breakdown by category for a pie chart
      operationId: getCategoryBreakdown
      tags:
        - Transactions
      security:
        - BearerAuth: []
      parameters:
        - name: date_from
          in: query
          required: false
          schema:
            type: string
            format: date
            example: "2025-03-01"
          description: Start date (ISO 8601). Defaults to start of current month.
        - name: date_to
          in: query
          required: false
          schema:
            type: string
            format: date
            example: "2025-03-31"
          description: End date (ISO 8601). Defaults to current time.
        - name: account_id
          in: query
          required: false
          schema:
            type: string
            example: 507f1f77bcf86cd799439012
          description: Filter by account. Omit for all accounts.
        - name: tnx_type
          in: query
          required: false
          schema:
            type: string
            enum: [debit, credit]
            default: debit
          description: Transaction type to break down. Defaults to debit (spending).
      responses:
        "200":
          description: Category breakdown for pie chart
          content:
            application/json:
              schema:
                type: object
                properties:
                  date_range:
                    type: object
                    properties:
                      from:
                        type: string
                        format: date-time
                        example: "2025-03-01T00:00:00.000Z"
                      to:
                        type: string
                        format: date-time
                        example: "2025-03-28T10:30:00.000Z"
                  account_id:
                    type: string
                    nullable: true
                    example: 507f1f77bcf86cd799439012
                  tnx_type:
                    type: string
                    enum: [debit, credit]
                    example: debit
                  total:
                    type: number
                    description: Sum of all transaction amounts in range
                    example: 8500.00
                  categories:
                    type: array
                    items:
                      type: object
                      properties:
                        category_id:
                          type: string
                          nullable: true
                          example: 507f1f77bcf86cd799439014
                        category_name:
                          type: string
                          example: Food
                        amount:
                          type: number
                          example: 2500.00
                        count:
                          type: integer
                          example: 10
                        percentage:
                          type: number
                          description: Share of total (0–100)
                          example: 29.41
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /getSpendingTrend:
    get:
      summary: Get daily spending/income totals for a line graph (7d, 15d, or current month)
      operationId: getSpendingTrend
      tags:
        - Transactions
      security:
        - BearerAuth: []
      parameters:
        - name: period
          in: query
          required: false
          schema:
            type: string
            enum: [7d, 15d, month]
            default: month
          description: "7d = last 7 days, 15d = last 15 days, month = full current month"
        - name: account_id
          in: query
          required: false
          schema:
            type: string
            example: 507f1f77bcf86cd799439012
          description: Filter by account. Omit for all accounts.
        - name: tnx_type
          in: query
          required: false
          schema:
            type: string
            enum: [debit, credit]
            default: debit
          description: Transaction type. Defaults to debit.
      responses:
        "200":
          description: Daily totals for line graph
          content:
            application/json:
              schema:
                type: object
                properties:
                  period:
                    type: string
                    enum: [7d, 15d, month]
                    example: month
                  date_range:
                    type: object
                    properties:
                      from:
                        type: string
                        format: date-time
                        example: "2025-03-01T00:00:00.000Z"
                      to:
                        type: string
                        format: date-time
                        example: "2025-03-28T23:59:59.999Z"
                  account_id:
                    type: string
                    nullable: true
                    example: null
                  tnx_type:
                    type: string
                    enum: [debit, credit]
                    example: debit
                  total:
                    type: number
                    description: Sum across all days in range
                    example: 8500.00
                  days:
                    type: array
                    description: One entry per calendar day — no gaps
                    items:
                      type: object
                      properties:
                        date:
                          type: string
                          format: date
                          example: "2025-03-15"
                        amount:
                          type: number
                          example: 350.00
                        count:
                          type: integer
                          example: 3
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /merchant/{id}/category:
    put:
      summary: Update merchant category and sync all its transactions
      operationId: updateMerchantCategory
      tags:
        - Transactions
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            example: 507f1f77bcf86cd799439013
          description: Merchant ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - category_name
              properties:
                category_name:
                  type: string
                  example: Food
      responses:
        "200":
          description: Category updated and transactions synced
          content:
            application/json:
              schema:
                type: object
                properties:
                  category:
                    type: object
                    properties:
                      _id:
                        type: string
                        example: 507f1f77bcf86cd799439014
                      name:
                        type: string
                        example: Food
                      type:
                        type: string
                        enum: [expense, income]
                        example: expense
                      created:
                        type: boolean
                        description: true if a new category was created, false if existing was reused
                        example: false
                  transactions_updated:
                    type: integer
                    description: Number of transactions updated with the new category
                    example: 12
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Merchant not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /getStatistics:
    get:
      summary: Get spending and income summary for a date range and/or account
      operationId: getStatistics
      tags:
        - Transactions
      security:
        - BearerAuth: []
      parameters:
        - name: date_from
          in: query
          required: false
          schema:
            type: string
            format: date
            example: "2025-03-01"
          description: Start date (ISO 8601). Defaults to start of current month.
        - name: date_to
          in: query
          required: false
          schema:
            type: string
            format: date
            example: "2025-03-31"
          description: End date (ISO 8601). Defaults to current time.
        - name: account_id
          in: query
          required: false
          schema:
            type: string
            example: 507f1f77bcf86cd799439012
          description: Filter by account. Omit to aggregate across all accounts.
      responses:
        "200":
          description: Spending and income summary
          content:
            application/json:
              schema:
                type: object
                properties:
                  date_range:
                    type: object
                    properties:
                      from:
                        type: string
                        format: date-time
                        example: "2025-03-01T00:00:00.000Z"
                      to:
                        type: string
                        format: date-time
                        example: "2025-03-28T10:30:00.000Z"
                  account_id:
                    type: string
                    nullable: true
                    example: 507f1f77bcf86cd799439012
                  range:
                    $ref: "#/components/schemas/StatsSummary"
                  overall:
                    $ref: "#/components/schemas/StatsSummary"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /expensemetric:
    post:
      summary: Parse and store expense from SMS message
      operationId: expensemetric
      tags:
        - Metrics
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - message
              properties:
                message:
                  type: string
                  description: Raw SMS message to parse
                  example: "UPI transaction of Rs.500.00 debited from A/C XX1234"
      responses:
        "200":
          description: Transaction stored successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  transaction:
                    type: object
        "400":
          description: Message is required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    User:
      type: object
      properties:
        id:
          type: string
          example: 507f1f77bcf86cd799439011
        name:
          type: string
          example: John Doe
        email:
          type: string
          format: email
          example: john@example.com
        createdAt:
          type: string
          format: date-time
          example: "2024-01-15T10:30:00Z"
        updatedAt:
          type: string
          format: date-time
          example: "2024-01-15T10:30:00Z"

    AuthResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/User"
        accessToken:
          type: string
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ1c2VySWQiOiI1MDdmMWY3N2JjZjg2Y2Q3OTk0MzkwMTEiLCJpYXQiOjE3MDQ1MTIwMDAsImV4cCI6MTcwNDUxNTYwMH0.XYZ...
        refreshToken:
          type: string
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ1c2VySWQiOiI1MDdmMWY3N2JjZjg2Y2Q3OTk0MzkwMTEiLCJpYXQiOjE3MDQ1MTIwMDAsImV4cCI6MTcwNTExNjgwMH0.ABC...

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          example: Invalid email or password

    StatsSummary:
      type: object
      properties:
        spent:
          type: object
          properties:
            amount:
              type: number
              example: 4250.00
            count:
              type: integer
              example: 18
        gained:
          type: object
          properties:
            amount:
              type: number
              example: 23000.00
            count:
              type: integer
              example: 2
        net:
          type: number
          description: gained - spent
          example: 18750.00

    TransactionDetail:
      type: object
      properties:
        _id:
          type: string
          example: 507f1f77bcf86cd799439011
        amount:
          type: number
          example: 500.00
        tnx_type:
          type: string
          enum: [debit, credit]
          example: debit
        tnx_date:
          type: string
          format: date-time
          example: "2025-03-15T10:30:00Z"
        raw_message:
          type: string
          example: "UPI transaction of Rs.500.00 debited from A/C XX1234"
        source_name:
          type: string
          example: Swiggy
        source_vpa:
          type: string
          example: swiggy@upi
        createdAt:
          type: string
          format: date-time
          example: "2025-03-15T10:30:00Z"
        updatedAt:
          type: string
          format: date-time
          example: "2025-03-15T10:30:00Z"
        account:
          nullable: true
          type: object
          properties:
            _id:
              type: string
              example: 507f1f77bcf86cd799439012
            bank_name:
              type: string
              example: HDFC Bank
            account_mask:
              type: string
              example: "1234"
        merchant:
          nullable: true
          type: object
          properties:
            _id:
              type: string
              example: 507f1f77bcf86cd799439013
            original_name:
              type: string
              example: SWIGGY ORDER
            alias_name:
              type: string
              example: Swiggy
            type:
              type: string
              enum: [merchant, person]
              example: merchant
            category_id:
              type: string
              nullable: true
              example: 507f1f77bcf86cd799439014
        category:
          type: object
          properties:
            _id:
              type: string
              example: 507f1f77bcf86cd799439014
            name:
              type: string
              example: Food
            type:
              type: string
              enum: [expense, income]
              example: expense

    Pagination:
      type: object
      properties:
        page:
          type: integer
          example: 1
        page_size:
          type: integer
          example: 50
        total:
          type: integer
          example: 142
        total_pages:
          type: integer
          example: 3

    Transaction:
      type: object
      properties:
        _id:
          type: string
          example: 507f1f77bcf86cd799439011
        user:
          type: string
          example: 507f1f77bcf86cd799439011
        account_id:
          type: string
          example: 507f1f77bcf86cd799439012
        amount:
          type: number
          example: 500.00
        tnx_type:
          type: string
          enum: [debit, credit]
          example: debit
        tnx_date:
          type: string
          format: date-time
          example: "2025-03-15T10:30:00Z"
        category:
          type: string
          description: Category name, or "Others" if not assigned
          example: Food
        source_name:
          type: string
          example: Swiggy
